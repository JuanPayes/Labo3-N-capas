services:
  # Servicio 1: PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: sheikah-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - sheikah-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sheikah-network

  # Servicio 2: Backend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sheikah-api
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL: ${SPRING_JPA_HIBERNATE_DDL}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL}
      SPRING_JPA_HIBERNATE_DIALECT: ${SPRING_JPA_HIBERNATE_DIALECT}
      SPRING_APPLICATION_NAME: ${SPRING_APPLICATION_NAME}
    ports:
      - "8080:8080"
    networks:
      - sheikah-network

networks:
  sheikah-network:

volumes:
  sheikah-db-data:
    driver: local